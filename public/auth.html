<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ScoutMind — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#07090f;color:#edf2f7;font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:4px;color:#00e5a0;margin-bottom:6px;}
.logo span{color:#edf2f7;}
.tagline{font-size:13px;color:#5a6a85;margin-bottom:32px;}
.card{background:#0d1117;border:1px solid #1a2540;border-radius:16px;padding:32px;width:100%;max-width:420px;}
.tabs{display:flex;border-bottom:1px solid #1a2540;margin-bottom:24px;gap:0;}
.tab-btn{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;color:#5a6a85;cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;font-family:'DM Sans',sans-serif;transition:all .2s;}
.tab-btn.active{color:#00e5a0;border-bottom:2px solid #00e5a0;}
.form-section{display:none;}
.form-section.active{display:block;}
.field{margin-bottom:16px;}
.field label{display:block;font-size:11px;font-weight:600;color:#5a6a85;letter-spacing:0.5px;margin-bottom:6px;text-transform:uppercase;}
.field input{width:100%;background:#141b27;border:1px solid #1a2540;color:#edf2f7;padding:11px 14px;border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;outline:none;}
.field input:focus{border-color:#00e5a0;}
.btn-primary{width:100%;background:#00e5a0;color:#000;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:800;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:4px;}
.btn-primary:hover{background:#00ffb3;}
.divider{text-align:center;color:#5a6a85;font-size:12px;margin:14px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:#1a2540;}
.divider::before{left:0;} .divider::after{right:0;}
.btn-demo{width:100%;background:transparent;border:1px solid #1a2540;color:#5a6a85;padding:10px;border-radius:8px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.btn-demo:hover{border-color:#5a6a85;color:#edf2f7;}
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
.msg.error{background:rgba(255,69,96,0.1);border:1px solid rgba(255,69,96,0.3);color:#ff4560;}
.msg.success{background:rgba(0,229,160,0.08);border:1px solid rgba(0,229,160,0.2);color:#00e5a0;}
.plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;}
.plan-opt{border:1px solid #1a2540;border-radius:8px;padding:11px 12px;cursor:pointer;}
.plan-opt:hover,.plan-opt.sel{border-color:#00e5a0;background:rgba(0,229,160,0.05);}
.plan-name{font-size:13px;font-weight:700;}
.plan-price{font-size:11px;color:#5a6a85;margin-top:2px;}
.back{text-align:center;margin-top:14px;font-size:12px;color:#5a6a85;cursor:pointer;}
.back:hover{color:#edf2f7;}
</style>
</head>
<body>

<div class="logo">Scout<span>Mind</span></div>
<div class="tagline">AI-powered football scouting platform</div>

<div class="card">
  <div class="tabs">
    <button class="tab-btn active" id="btn-login" onclick="switchTab('login')">Sign In</button>
    <button class="tab-btn" id="btn-register" onclick="switchTab('register')">Create Account</button>
  </div>

  <div class="msg error" id="msg-error"></div>
  <div class="msg success" id="msg-success"></div>

  <!-- LOGIN -->
  <div class="form-section active" id="sec-login">
    <div class="field">
      <label>Email</label>
      <input type="email" id="l-email" placeholder="your@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="l-pass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-primary" onclick="doLogin()" id="l-btn">Sign In</button>
    <div class="divider">or</div>
    <button class="btn-demo" onclick="doDemo()">👁 Preview as Demo User (no account needed)</button>
  </div>

  <!-- REGISTER -->
  <div class="form-section" id="sec-register">
    <div class="field">
      <label>Full name</label>
      <input type="text" id="r-name" placeholder="Your name">
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="r-email" placeholder="your@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="r-pass" placeholder="Min. 8 characters">
    </div>
    <div class="field">
      <label>Choose plan</label>
      <div class="plan-grid">
        <div class="plan-opt sel" onclick="pickPlan('free',this)">
          <div class="plan-name">Scout Free</div>
          <div class="plan-price">$0 forever</div>
        </div>
        <div class="plan-opt" onclick="pickPlan('pro',this)">
          <div class="plan-name">Scout Pro</div>
          <div class="plan-price">$9.99/month</div>
        </div>
        <div class="plan-opt" onclick="pickPlan('club',this)">
          <div class="plan-name">Club Basic</div>
          <div class="plan-price">$49/month</div>
        </div>
        <div class="plan-opt" onclick="pickPlan('clubpro',this)">
          <div class="plan-name">Club Pro</div>
          <div class="plan-price">$199/month</div>
        </div>
      </div>
    </div>
    <button class="btn-primary" onclick="doRegister()" id="r-btn">Create Account</button>
    <div class="divider">or</div>
    <button class="btn-demo" onclick="doDemo()">👁 Preview as Demo User</button>
  </div>

  <div class="back" onclick="window.location.href='/'">← Back to scoutmind.app</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
var SURL = 'https://kdhbpzooyjxcglbxbuya.supabase.co';
var SKEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtkaGJwem9veWp4Y2dsYnhidXlhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3NTEwNTMsImV4cCI6MjA5MzMyNzA1M30.mcflbqGij3Kzm_Ooe5yMw-fMUBWe25-y6TRiChFuekw';
var sb = supabase.createClient(SURL, SKEY);
var plan = 'free';

// Check if already logged in
sb.auth.getSession().then(function(res) {
  if (res.data && res.data.session) {
    window.location.href = '/app.html';
  }
});

// Check URL params
var params = new URLSearchParams(window.location.search);
if (params.get('tab') === 'signup') switchTab('register');
if (params.get('plan')) pickPlanByName(params.get('plan'));

function switchTab(tab) {
  document.getElementById('sec-login').className = 'form-section' + (tab==='login'?' active':'');
  document.getElementById('sec-register').className = 'form-section' + (tab==='register'?' active':'');
  document.getElementById('btn-login').className = 'tab-btn' + (tab==='login'?' active':'');
  document.getElementById('btn-register').className = 'tab-btn' + (tab==='register'?' active':'');
  clearMsgs();
}

function pickPlan(p, el) {
  plan = p;
  document.querySelectorAll('.plan-opt').forEach(function(o){ o.classList.remove('sel'); });
  el.classList.add('sel');
}

function pickPlanByName(p) {
  plan = p;
  var opts = document.querySelectorAll('.plan-opt');
  opts.forEach(function(o){ o.classList.remove('sel'); });
  var idx = {free:0,pro:1,club:2,clubpro:3}[p];
  if (idx !== undefined && opts[idx]) opts[idx].classList.add('sel');
}

function showError(msg) {
  var el = document.getElementById('msg-error');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('msg-success').style.display = 'none';
}
function showSuccess(msg) {
  var el = document.getElementById('msg-success');
  el.textContent = msg; el.style.display = 'block';
  document.getElementById('msg-error').style.display = 'none';
}
function clearMsgs() {
  document.getElementById('msg-error').style.display = 'none';
  document.getElementById('msg-success').style.display = 'none';
}

function saveUser(id, email, name, userPlan) {
  localStorage.setItem('sm_current_user', JSON.stringify({
    id: id, email: email, name: name, plan: userPlan || 'free'
  }));
}

async function doLogin() {
  var email = document.getElementById('l-email').value.trim();
  var pass = document.getElementById('l-pass').value;
  if (!email || !pass) return showError('Please fill in all fields.');
  var btn = document.getElementById('l-btn');
  btn.textContent = 'Signing in...'; btn.disabled = true;
  var res = await sb.auth.signInWithPassword({email: email, password: pass});
  if (res.error) {
    showError(res.error.message === 'Invalid login credentials' ? 'Wrong email or password.' : res.error.message);
    btn.textContent = 'Sign In'; btn.disabled = false;
    return;
  }
  var profRes = await sb.from('profiles').select('*').eq('id', res.data.user.id).single();
  var prof = profRes.data;
  saveUser(res.data.user.id, email, prof ? prof.name : email.split('@')[0], prof ? prof.plan : 'free');
  window.location.href = '/app.html';
}

async function doRegister() {
  var name = document.getElementById('r-name').value.trim();
  var email = document.getElementById('r-email').value.trim();
  var pass = document.getElementById('r-pass').value;
  if (!name || !email || !pass) return showError('Please fill in all fields.');
  if (pass.length < 8) return showError('Password must be at least 8 characters.');
  var btn = document.getElementById('r-btn');
  btn.textContent = 'Creating account...'; btn.disabled = true;
  var res = await sb.auth.signUp({email: email, password: pass, options: {data: {name: name, plan: plan}}});
  if (res.error) {
    showError(res.error.message);
    btn.textContent = 'Create Account'; btn.disabled = false;
    return;
  }
  if (res.data.user) {
    await sb.from('profiles').upsert({id: res.data.user.id, name: name, email: email, plan: plan, created_at: new Date().toISOString()});
    saveUser(res.data.user.id, email, name, plan);
  }
  if (res.data.session) {
    window.location.href = '/app.html';
  } else {
    showSuccess('Account created! Check your email to verify, then sign in.');
    btn.textContent = 'Create Account'; btn.disabled = false;
  }
}

function doDemo() {
  saveUser('demo', 'demo@scoutmind.app', 'Demo User', 'pro');
  window.location.href = '/app.html';
}
</script>
</body>
</html>
